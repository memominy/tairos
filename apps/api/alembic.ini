# Alembic configuration for Tairos Sentinel backend.
#
# The ``sqlalchemy.url`` below is a placeholder — the real URL is read
# from our ``Settings`` object inside ``alembic/env.py``. That means
# the operator overrides the DB via ``DATABASE_URL`` / .env exactly like
# the FastAPI app does, and never has to keep two config files in sync.
#
# Run migrations from apps/api/:
#   alembic revision --autogenerate -m "..."
#   alembic upgrade head

[alembic]
script_location   = alembic
prepend_sys_path  = .
sqlalchemy.url    = sqlite:///./.data/tairos.sqlite
file_template     = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone          = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level   = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level   = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level   = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format      = %(levelname)-5.5s [%(name)s] %(message)s
datefmt     = %H:%M:%S
